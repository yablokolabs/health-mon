<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="arrow-hm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="460" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e293b">health-mon — TMR Voting, Watchdog, Degraded Mode</text>

  <!-- TMR Voter -->
  <rect x="30" y="60" width="260" height="200" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="82" text-anchor="middle" font-weight="bold" fill="#1e40af">TMR Voter</text>

  <rect x="45" y="95" width="70" height="50" rx="4" fill="white" stroke="#3b82f6"/>
  <text x="80" y="118" text-anchor="middle" fill="#1e293b" font-size="10">Ch A</text>
  <text x="80" y="133" text-anchor="middle" fill="#64748b" font-size="9">100.0</text>
  <rect x="125" y="95" width="70" height="50" rx="4" fill="white" stroke="#3b82f6"/>
  <text x="160" y="118" text-anchor="middle" fill="#1e293b" font-size="10">Ch B</text>
  <text x="160" y="133" text-anchor="middle" fill="#64748b" font-size="9">100.3</text>
  <rect x="205" y="95" width="70" height="50" rx="4" fill="#fef2f2" stroke="#ef4444"/>
  <text x="240" y="118" text-anchor="middle" fill="#b91c1c" font-size="10">Ch C</text>
  <text x="240" y="133" text-anchor="middle" fill="#b91c1c" font-size="9">999.0 ✗</text>

  <rect x="90" y="160" width="100" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="140" y="177" text-anchor="middle" fill="#065f46" font-size="10">Majority Vote</text>
  <text x="140" y="190" text-anchor="middle" fill="#065f46" font-size="9">→ 100.15</text>

  <text x="160" y="218" text-anchor="middle" fill="#1e40af" font-size="9">2/3 agree · Ch C flagged faulty</text>
  <text x="160" y="232" text-anchor="middle" fill="#1e40af" font-size="9">Also: Duplex cross-compare</text>
  <text x="160" y="246" text-anchor="middle" fill="#1e40af" font-size="9">Tolerance-based agreement</text>

  <!-- Watchdog -->
  <rect x="320" y="60" width="260" height="200" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="82" text-anchor="middle" font-weight="bold" fill="#92400e">Watchdog Timer</text>

  <rect x="335" y="100" width="230" height="28" rx="3" fill="#d1fae5" stroke="#10b981"/>
  <text x="450" y="119" text-anchor="middle" fill="#065f46" font-size="10">Ch 1: ✓ healthy (kicked 50ms ago)</text>
  <rect x="335" y="135" width="230" height="28" rx="3" fill="#d1fae5" stroke="#10b981"/>
  <text x="450" y="154" text-anchor="middle" fill="#065f46" font-size="10">Ch 2: ✓ healthy (kicked 30ms ago)</text>
  <rect x="335" y="170" width="230" height="28" rx="3" fill="#fef2f2" stroke="#ef4444"/>
  <text x="450" y="189" text-anchor="middle" fill="#b91c1c" font-size="10">Ch 3: ✗ TIMEOUT (200ms no kick)</text>

  <text x="450" y="220" text-anchor="middle" fill="#92400e" font-size="9">Configurable timeout per channel</text>
  <text x="450" y="235" text-anchor="middle" fill="#92400e" font-size="9">Kick count + timeout count tracking</text>
  <text x="450" y="250" text-anchor="middle" fill="#92400e" font-size="9">Recovery on re-kick</text>

  <!-- Health Manager -->
  <rect x="610" y="60" width="270" height="200" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="745" y="82" text-anchor="middle" font-weight="bold" fill="#5b21b6">Health Manager</text>

  <rect x="625" y="100" width="240" height="28" rx="3" fill="#d1fae5" stroke="#10b981"/>
  <text x="745" y="119" text-anchor="middle" fill="#065f46" font-size="10">HEALTHY — all nominal</text>
  <rect x="625" y="135" width="240" height="28" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="745" y="154" text-anchor="middle" fill="#92400e" font-size="10">DEGRADED — faults detected</text>
  <rect x="625" y="170" width="240" height="28" rx="3" fill="#fef2f2" stroke="#ef4444"/>
  <text x="745" y="189" text-anchor="middle" fill="#b91c1c" font-size="10">FAULTY — threshold exceeded</text>

  <text x="745" y="220" text-anchor="middle" fill="#5b21b6" font-size="9">Policies: Continue · Failsafe · Shutdown</text>
  <text x="745" y="235" text-anchor="middle" fill="#5b21b6" font-size="9">Voter disagreement + watchdog timeout</text>
  <text x="745" y="250" text-anchor="middle" fill="#5b21b6" font-size="9">→ Combined system health score</text>

  <!-- Arrows -->
  <line x1="160" y1="195" x2="160" y2="300" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="250" x2="450" y2="300" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="160" y1="300" x2="610" y2="300" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-hm)"/>
  <line x1="450" y1="300" x2="610" y2="300" stroke="#64748b" stroke-width="1.5"/>

  <!-- Summary -->
  <rect x="180" y="340" width="540" height="65" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="362" text-anchor="middle" font-weight="bold" fill="#475569">Integration</text>
  <text x="450" y="382" text-anchor="middle" fill="#64748b" font-size="11">TMR voter + watchdog → Health Manager → degraded mode policy</text>
  <text x="450" y="397" text-anchor="middle" fill="#64748b" font-size="11">No dynamic allocation · CLOCK_MONOTONIC · Compile-time channel capacity</text>

  <!-- Footer -->
  <text x="450" y="440" text-anchor="middle" fill="#94a3b8" font-size="10">Research prototype — not certified to any standard. Apache-2.0.</text>
</svg>
